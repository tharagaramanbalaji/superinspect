<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Actual Application</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #f8fafc; 
            color: #334155;
            padding: 40px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 800px;
        }
        .header {
            margin-bottom: 40px;
        }
        .header h1 {
            color: #0f172a;
            font-size: 32px;
            margin-bottom: 8px;
        }
        .header p {
            color: #64748b;
            font-size: 16px;
        }
        .card { 
            background: white; 
            padding: 32px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05); 
            border: 1px solid #e2e8f0;
        }
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }
        button.action { 
            background: #f1f5f9; 
            color: #475569; 
            border: 1px solid #cbd5e1; 
            padding: 12px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        button.action:hover {
            background: #e2e8f0;
            color: #0f172a;
        }
        button.action.slow {
            color: #be123c;
            background: #fff1f2;
            border-color: #fecdd3;
        }
        button.action.slow:hover {
            background: #ffe4e6;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Acme Corp Dashboard</h1>
            <p>This is your regular frontend application. Notice the widget injected in the bottom right corner?</p>
        </div>
        
        <div class="card">
            <h3>Trigger API Calls</h3>
            <p>Click these buttons to dispatch fetch requests to your backend. Open the SuperInspect widget to see them tracked in real-time!</p>
            
            <div class="button-group">
                <button class="action" onclick="fetch('http://localhost:3000/fast')">Load User Data (Fast)</button>
                <button class="action" onclick="fetch('http://localhost:3000/data', { method: 'POST' })">Submit Form (Fast)</button>
                <button class="action slow" onclick="fetch('http://localhost:3000/slow')">Generate Report (Slow)</button>
                <button class="action" onclick="fetch('http://localhost:3000/error-simulation').catch(()=>{})">Simulate 404 Error</button>
            </div>
        </div>
    </div>

    <!-- 1. Include the snippet in your app -->
    <script src="./widget.js"></script>
    
    <!-- 2. Initialize it -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            new SuperInspectWidget({
                dashboardUrl: 'http://localhost:5173'
            });
        });
    </script>
</body>
</html>
